<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket League 3D: AI & Kickoff</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #start-btn {
            padding: 15px 40px; font-size: 22px; color: white;
            background: #28a745; border: none; border-radius: 50px; cursor: pointer;
        }
        /* عداد البوست */
        #boost-container {
            position: fixed; bottom: 120px; right: 30px; width: 100px; height: 100px;
            border-radius: 50%; border: 5px solid rgba(255,255,255,0.2);
            display: none; align-items: center; justify-content: center;
        }
        #boost-fill {
            position: absolute; bottom: 0; width: 100%; background: orange;
            transition: height 0.1s; border-radius: 0 0 50px 50px; opacity: 0.6;
        }
        #boost-text { color: white; font-weight: bold; z-index: 2; font-size: 20px; }
        
        .controls {
            position: fixed; bottom: 20px; width: 100%; display: none;
            justify-content: space-between; padding: 0 20px; box-sizing: border-box;
            pointer-events: none; z-index: 10;
        }
        .btn {
            width: 65px; height: 65px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; pointer-events: auto; border: 1px solid rgba(255,255,255,0.3);
        }
        .joy-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <h1 style="color: white;">RL 3D: VS AI</h1>
    <button id="start-btn">KICKOFF!</button>
</div>

<div id="boost-container">
    <div id="boost-fill"></div>
    <div id="boost-text">100</div>
</div>

<div class="controls" id="mobile-ui">
    <div class="joy-area">
        <div></div><div class="btn" id="up">▲</div><div></div>
        <div class="btn" id="left">◀</div><div></div><div class="btn" id="right">▶</div>
        <div></div><div class="btn" id="down">▼</div><div></div>
    </div>
    <div style="display: flex; gap: 10px; align-self: flex-end;">
        <div class="btn" id="jump" style="background:rgba(0,123,255,0.5)">JUMP</div>
        <div class="btn" id="boost" style="background:rgba(255,69,0,0.5)">BOOST</div>
    </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer);

// الإضاءة والملعب
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 160), new THREE.MeshStandardMaterial({color: 0x114411}));
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// الكرة
const ball = new THREE.Mesh(new THREE.SphereGeometry(2, 24, 24), new THREE.MeshStandardMaterial({color: 0xffff00}));
scene.add(ball);

// السيارة (لاعب)
const car = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(3, 1.5, 5), new THREE.MeshStandardMaterial({color: 0x007bff}));
car.add(body);
scene.add(car);

// الذكاء الاصطناعي (AI)
const aiCar = new THREE.Group();
const aiBody = new THREE.Mesh(new THREE.BoxGeometry(3, 1.5, 5), new THREE.MeshStandardMaterial({color: 0xff0000}));
aiCar.add(aiBody);
scene.add(aiCar);

// البوست (Boost Pads)
const pads = [];
function createPad(x, z) {
    const pad = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 0.2, 16), new THREE.MeshBasicMaterial({color: 0xffa500, transparent: true, opacity: 0.5}));
    pad.position.set(x, 0.1, z);
    scene.add(pad);
    pads.push(pad);
}
createPad(20, 20); createPad(-20, 20); createPad(20, -20); createPad(-20, -20); createPad(0, 40); createPad(0, -40);

// المنطق والتحكم
let boostAmount = 100;
let speed = 0;
let aiSpeed = 0.15;
const keys = {};

function resetKickoff() {
    ball.position.set(0, 2, 0);
    car.position.set(0, 0.75, 50);
    car.rotation.y = Math.PI;
    aiCar.position.set(0, 0.75, -50);
    aiCar.rotation.y = 0;
    speed = 0;
}

document.getElementById('start-btn').onclick = () => {
    document.getElementById('ui-overlay').style.display = 'none';
    document.getElementById('mobile-ui').style.display = 'flex';
    document.getElementById('boost-container').style.display = 'flex';
    resetKickoff();
};

const setup = (id) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); keys[id] = true; };
    el.ontouchend = () => keys[id] = false;
};
['up','down','left','right','boost','jump'].forEach(setup);

function animate() {
    requestAnimationFrame(animate);
    
    // حركة اللاعب
    if(keys['up']) speed += 0.005;
    if(keys['down']) speed -= 0.005;
    if(keys['left']) car.rotation.y += 0.04;
    if(keys['right']) car.rotation.y -= 0.04;

    // البوست
    if(keys['boost'] && boostAmount > 0) {
        speed += 0.015;
        boostAmount -= 0.8;
    } else if(boostAmount < 100) {
        // لا يشحن تلقائياً إلا عند لمس الـ Pads
    }
    
    speed *= 0.96;
    car.translateZ(speed);

    // تحديث عداد البوست
    document.getElementById('boost-fill').style.height = boostAmount + "%";
    document.getElementById('boost-text').innerText = Math.floor(boostAmount);

    // ذكاء اصطناعي بسيط (يطارد الكرة)
    const direction = new THREE.Vector3().subVectors(ball.position, aiCar.position).normalize();
    aiCar.position.add(direction.multiplyScalar(aiSpeed));
    aiCar.lookAt(ball.position);

    // اصطدام السيارة بالكرة
    if(car.position.distanceTo(ball.position) < 4) {
        ball.position.add(new THREE.Vector3(0,0,-2).applyQuaternion(car.quaternion));
    }
    if(aiCar.position.distanceTo(ball.position) < 4) {
        ball.position.add(new THREE.Vector3(0,0,2));
    }

    // لمس كبسولات البوست
    pads.forEach(p => {
        if(car.position.distanceTo(p.position) < 5 && p.visible) {
            boostAmount = Math.min(100, boostAmount + 30);
            p.visible = false;
            setTimeout(() => p.visible = true, 5000);
        }
    });

    // الكاميرا
    const camOffset = new THREE.Vector3(0, 10, -20).applyMatrix4(car.matrixWorld);
    camera.position.lerp(camOffset, 0.1);
    camera.lookAt(car.position);

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
