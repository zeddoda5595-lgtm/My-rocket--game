<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Rocket 2D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        .btn { 
            width: 80px; height: 80px; background: rgba(255,255,255,0.2); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; font-size: 14px; pointer-events: auto;
            user-select: none; border: 2px solid rgba(255,255,255,0.4);
        }
        .btn:active { background: rgba(255,255,255,0.5); transform: scale(0.9); }
        .left-group { display: flex; gap: 15px; }
    </style>
</head>
<body>

<div class="controls">
    <div class="left-group">
        <div class="btn" id="btnLeft">⬅️</div>
        <div class="btn" id="btnRight">➡️</div>
    </div>
    <div class="left-group">
        <div class="btn" id="btnJump" style="background: rgba(255, 165, 0, 0.3);">JUMP</div>
        <div class="btn" id="btnBoost" style="background: rgba(255, 0, 0, 0.3);">BOOST</div>
    </div>
</div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Body, Vector } = Matter;
    const engine = Engine.create();
    const render = Render.create({
        element: document.body,
        engine: engine,
        options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#222' }
    });

    // إنشاء الأرضية والجدران
    const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 25, window.innerWidth, 60, { isStatic: true });
    const wallLeft = Bodies.rectangle(-25, window.innerHeight/2, 60, window.innerHeight, { isStatic: true });
    const wallRight = Bodies.rectangle(window.innerWidth + 25, window.innerHeight/2, 60, window.innerHeight, { isStatic: true });
    const ceiling = Bodies.rectangle(window.innerWidth/2, -25, window.innerWidth, 60, { isStatic: true });

    // السيارة والكرة (فيزياء روكت ليق)
    const car = Bodies.rectangle(200, window.innerHeight - 100, 80, 40, { 
        friction: 0.1, frictionAir: 0.02, 
        render: { fillStyle: '#3498db' } 
    });
    const ball = Bodies.circle(window.innerWidth/2, 200, 35, { 
        restitution: 0.8, friction: 0.05, density: 0.001,
        render: { fillStyle: '#f1c40f' } 
    });

    Composite.add(engine.world, [car, ball, ground, wallLeft, wallRight, ceiling]);

    // وظائف الحركة
    const move = (dir) => Body.applyForce(car, car.position, { x: dir * 0.005, y: 0 });
    const jump = () => Body.applyForce(car, car.position, { x: 0, y: -0.06 });
    const boost = () => Body.applyForce(car, car.position, { x: Math.cos(car.angle) * 0.02, y: Math.sin(car.angle) * 0.02 });

    // ربط الأزرار (Touch & Mouse)
    const setupBtn = (id, action) => {
        const el = document.getElementById(id);
        let interval;
        const start = () => { action(); interval = setInterval(action, 20); };
        const stop = () => clearInterval(interval);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        el.addEventListener('touchend', stop);
        el.addEventListener('mousedown', start);
        el.addEventListener('mouseup', stop);
    };

    setupBtn('btnLeft', () => move(-1));
    setupBtn('btnRight', () => move(1));
    setupBtn('btnJump', jump);
    setupBtn('btnBoost', boost);

    // إضافة تحكم الكيبورد أيضاً
    window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowLeft') move(-1);
        if(e.key === 'ArrowRight') move(1);
        if(e.key === ' ') jump();
        if(e.key === 'Shift') boost();
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    // إعادة ضبط الكرة إذا خرجت أو للبدء من جديد
    setInterval(() => {
        if (ball.position.y > window.innerHeight) Body.setPosition(ball, {x: window.innerWidth/2, y: 100});
    }, 1000);
</script>
</body>
</html>
