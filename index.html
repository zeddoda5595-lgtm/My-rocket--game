<!DOCTYPE html>
<html>
<head>
    <title>Mini Rocket League</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>body { margin: 0; overflow: hidden; background: #222; }</style>
</head>
<body>
<script>
    const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
    const engine = Engine.create();
    const render = Render.create({ element: document.body, engine: engine, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false }});
    
    // السيارة والكرة
    const car = Bodies.rectangle(200, 500, 80, 40, { friction: 0.5 });
    const ball = Bodies.circle(600, 500, 30, { restitution: 0.9 });
    const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight, window.innerWidth, 60, { isStatic: true });

    Composite.add(engine.world, [car, ball, ground]);

    // تحكم بسيط
    window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowRight') Body.applyForce(car, car.position, {x: 0.05, y: 0});
        if(e.key === 'ArrowUp') Body.applyForce(car, car.position, {x: 0, y: -0.1});
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);
</script>
</body>
</html>
